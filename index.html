<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de CV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <h1 class="logo">Générateur de CV</h1>
        <button class="btn-primary">Télécharger en PDF</button>
    </header>

    <main class="main-layout">

       <section class="form-panel">

    <div class="form-section">
        <h2>Informations personnelles</h2>

        <div class="form-row">
            <div class="form-field">
                <label for="firstName">Prénom</label>
                <input type="text" id="firstName" placeholder="Jean">
            </div>
            <div class="form-field">
                <label for="lastName">Nom</label>
                <input type="text" id="lastName" placeholder="Dupont">
            </div>
        </div>

        <div class="form-field">
            <label for="jobTitle">Intitulé du poste</label>
            <input type="text" id="jobTitle" placeholder="Développeur Web">
        </div>

        <div class="form-row">
            <div class="form-field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="jean.dupont@email.com">
            </div>
            <div class="form-field">
                <label for="phone">Téléphone</label>
                <input type="tel" id="phone" placeholder="06 12 34 56 78">
            </div>
        </div>

        <div class="form-row">
            <div class="form-field">
                <label for="city">Ville</label>
                <input type="text" id="city" placeholder="Paris">
            </div>
            <div class="form-field">
                <label for="linkedin">LinkedIn (optionnel)</label>
                <input type="url" id="linkedin" placeholder="linkedin.com/in/jeandupont">
            </div>
        </div>
    </div>

    <div class="form-section">
        <h2>Profil</h2>
        <div class="form-field">
            <label for="profile">Présentez-vous en quelques phrases</label>
            <textarea id="profile" rows="4" placeholder="Développeur web passionné avec 5 ans d'expérience..."></textarea>
        </div>
    </div>

</section>

        <section class="preview-panel">
            <div class="cv-preview">
                <h2>Aperçu du CV</h2>
                <p>L'aperçu du CV s'affichera ici.</p>
            </div>
        </section>

    </main>

</body>
</html>
